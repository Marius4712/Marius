<!doctype html>
<html lang="fr">
<head>

  <title>Lecture mobilités – IUT Bordeaux Montaigne — Marius Vacqué</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: #111;
      background: #ffffff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;

    }

    }

      font-size: 1.2rem;

      margin: 0 auto;
    }
    .back {

      margin: 60px 0;

    .back a {

      background: rgba(74,140,107,0.2);

      border-radius: 12px;
