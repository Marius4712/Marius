<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartographie interactive des projets ORT — Marius Vacqué</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: #111;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0 20px;
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      margin: 0;
    }
    .kicker {
      color: #666;
      font-size: 1.1rem;
      margin-top: 8px;
    }
    #map {
      height: 720px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin-top: 20px;
    }
    .custom-marker {
      background: #2e6f5c;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .leaflet-marker-icon:hover {
      transform: scale(1.3);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .leaflet-popup-content {
      margin: 12px 18px;
      font-size: 1rem;
      line-height: 1.6;
    }
    .leaflet-popup-content a {
      color: #2e6f5c;
      font-weight: 600;
      text-decoration: none;
    }
    .leaflet-popup-content a:hover {
      text-decoration: underline;
    }
    .back {
      text-align: center;
      margin: 40px 0;
    }
    .back a {
      padding: 14px 32px;
      background: rgba(74,140,107,0.2);
      color: #111;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
    }
    .back a:hover {
      background: rgba(74,140,107,0.4);
    }
  </style>
</head>
<body>
  <header>
    <h1>Cartographie interactive des projets ORT</h1>
    <div class="kicker">Lot-et-Garonne • Cliquez sur un point pour consulter la fiche projet</div>
  </header>

  <div class="container">
    <div id="map"></div>

    <div class="back">
      <a href="index.html#projets">Retour aux projets</a>
    </div>
  </div>

  <script>
    // Carte centrée sur le Lot-et-Garonne
    const map = L.map('map', {
      zoomControl: true,
      maxZoom: 15,
      minZoom: 8
    }).setView([44.40, 0.40], 9);

    // Fond clair style QGIS / atlas territorial
    L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap France',
      maxZoom: 20
    }).addTo(map);

    // Contour officiel du Lot-et-Garonne (GeoJSON public)
    fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements.geojson')
      .then(res => res.json())
      .then(data => {
        const lot47 = L.geoJSON(data, {
          filter: feature => feature.properties.code === "47",
          style: {
            color: "#2e6f5c",
            weight: 3,
            opacity: 0.9,
            fillColor: "#2e6f5c",
            fillOpacity: 0.08
          }
        }).addTo(map);

        // Zoom automatique sur le département
        map.fitBounds(lot47.getBounds(), { padding: [20, 20] });
      })
      .catch(err => console.error("Erreur chargement GeoJSON département:", err));

    // Données exactes des communes (tes coordonnées GPS)
    const villes = {
      "Sainte-Livrade-sur-Lot": { lat: 44.398, lng: 0.590, projets: ["Ilot-Soussial.pdf", "Berges-du-Lot.pdf"] },
      "Miramont-de-Guyenne": { lat: 44.602, lng: 0.360, projets: ["friche-Pimtou.pdf", "Parc-de-la-Dourdene.pdf", "Parc-des-équipements.pdf"] },
      "La Sauvetat-du-Dropt": { lat: 44.636, lng: 0.274, projets: ["Habitat-La-Sauvetat.pdf"] },
      "Lauzun": { lat: 44.629, lng: 0.461, projets: ["pole-loisir-Lauzun.pdf"] },
      "Nérac": { lat: 44.136, lng: 0.339, projets: ["Place-du-Floiral.pdf", "Réaménagement-Lafayette-Mondenard.pdf"] },
      "Aiguillon": { lat: 44.299, lng: 0.341, projets: ["Maison-Santé-Aiguillon.pdf", "Plage-sur-le-Lot.pdf"] },
      "Casteljaloux": { lat: 44.317, lng: -0.091, projets: ["Réhabilitation-ancien-hopital-Casteljaloux.pdf"] },
      "Duras": { lat: 44.676, lng: 0.183, projets: ["Espace-culturel-Duras.pdf", "Recyclerie-pays-de-Duras.pdf"] },
      "Villeréal": { lat: 44.635, lng: 0.742, projets: ["Bastide-de-Villeréal.pdf"] },
      "Port-Sainte-Marie": { lat: 44.252, lng: 0.389, projets: ["Vacance-logements-centre-bourg.pdf"] },
      "Castelmoron-sur-Lot": { lat: 44.400, lng: 0.493, projets: ["Liaison-douce-Castelmoron.pdf"] },
      "Tombeboeuf": { lat: 44.561, lng: 0.530, projets: ["Maison-santé-Castelmoron-Tombeboeuf.pdf"] },
      "Montflanquin": { lat: 44.530, lng: 0.768, projets: ["Ecole-maternelle-requalification.pdf"] },
      "Castillonnès": { lat: 44.652, lng: 0.593, projets: ["Maison-de-la-Bastide.pdf", "Boutique-à-l'essai.pdf"] },
      "Cancon": { lat: 44.536, lng: 0.624, projets: ["Foirail-jardin-public-Cancon.pdf", "Immeuble-Hicks-logement-saisonniers.pdf"] },
      "Bastides en Haut-Agenais Périgord": { lat: 44.62, lng: 0.68, projets: ["Tiers-lieu-4Cantons.pdf"] }
    };

    // Marqueur vert stylisé (effet hover)
    const iconProjet = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:#2e6f5c; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.3); transition:transform 0.2s;"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    // Ajout des marqueurs + popups
    Object.entries(villes).forEach(([commune, data]) => {
      const marker = L.marker([data.lat, data.lng], { icon: iconProjet }).addTo(map);

      let popupHTML = `<strong>${commune}</strong><br><br>`;
      data.projets.forEach(pdf => {
        popupHTML += `<a href="${pdf}" target="_blank" style="display:block; margin:5px 0; color:#2e6f5c;">→ ${pdf}</a>`;
      });

      marker.bindPopup(popupHTML, {
        maxWidth: 320,
        className: 'custom-popup'
      });
    });
  </script>
</body>
</html>
