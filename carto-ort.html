<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartographie interactive des projets ORT — Marius Vacqué</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: #111;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0 20px;
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      margin: 0;
    }
    .kicker {
      color: #666;
      font-size: 1.1rem;
      margin-top: 8px;
    }
    #map {
      height: 740px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.14);
      margin-top: 20px;
    }
    .custom-marker {
      background: #2e6f5c;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 8px rgba(0,0,0,0.35);
      transition: all 0.25s ease;
    }
    .leaflet-marker-icon:hover {
      transform: scale(1.35);
      box-shadow: 0 0 12px rgba(46,111,92,0.6);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    .leaflet-popup-content {
      margin: 14px 20px;
      font-size: 1.02rem;
      line-height: 1.65;
    }
    .leaflet-popup-content a {
      color: #2e6f5c;
      font-weight: 600;
      text-decoration: none;
      display: block;
      margin: 7px 0;
    }
    .leaflet-popup-content a:hover {
      text-decoration: underline;
    }
    .back {
      text-align: center;
      margin: 40px 0;
    }
    .back a {
      padding: 14px 32px;
      background: rgba(74,140,107,0.2);
      color: #111;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
    }
    .back a:hover {
      background: rgba(74,140,107,0.35);
    }
  </style>
</head>
<body>
  <header>
    <h1>Cartographie interactive des projets ORT</h1>
    <div class="kicker">Lot-et-Garonne • Cliquez sur un point pour consulter la fiche projet</div>
  </header>

  <div class="container">
    <div id="map"></div>

    <div class="back">
      <a href="index.html#projets">Retour aux projets</a>
    </div>
  </div>

  <script>
    // Carte centrée sur le Lot-et-Garonne
    const map = L.map('map', {
      zoomControl: true,
      maxZoom: 15,
      minZoom: 8
    }).setView([44.40, 0.40], 9);

    // Fond de carte normal (routes, bâtiments, etc.)
    L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap France',
      maxZoom: 19
    }).addTo(map);

    // Contour du Lot-et-Garonne en rouge vif (épais et très visible)
    fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          filter: f => f.properties.code === "47",
          style: {
            color: "#d32f2f",      // rouge vif
            weight: 5,             // épais pour être bien visible
            opacity: 1,
            fillOpacity: 0         // pas de remplissage intérieur
          }
        }).addTo(map);
      });

    // Découpage communal interne (lignes fines grises)
    fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/communes.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          filter: f => f.properties.code_departement === "47",
          style: {
            color: "#777",
            weight: 1,
            opacity: 0.5,
            fillOpacity: 0
          }
        }).addTo(map);
      });

    // Données projets – mise à jour précise selon tes consignes
    const projets = [
      { commune: "Miramont-de-Guyenne", lat: 44.602, lng: 0.360, fiches: [
        "Ilot-Soussial.pdf",          // ← déplacé ici comme demandé
        "friche-Pimtou.pdf",
        "Parc-de-la-Dourdene.pdf",
        "Parc-des-équipements.pdf"
      ]},
      { commune: "La Sauvetat-du-Dropt", lat: 44.636, lng: 0.274, fiches: ["Habitat-La-Sauvetat.pdf"] },
      { commune: "Lauzun", lat: 44.629, lng: 0.461, fiches: ["pole-loisir-Lauzun.pdf"] },
      { commune: "Nérac", lat: 44.136, lng: 0.339, fiches: ["Place-du-Floiral.pdf", "Réaménagement-Lafayette-Mondenard.pdf"] },
      { commune: "Aiguillon", lat: 44.299, lng: 0.341, fiches: ["Maison-Santé-Aiguillon.pdf", "Plage-sur-le-Lot.pdf"] },
      { commune: "Casteljaloux", lat: 44.317, lng: -0.091, fiches: ["Réhabilitation-ancien-hopital-Casteljaloux.pdf"] }, // ← coordonnées ajustées pour être pile sur la ville (zone jaune)
      { commune: "Duras", lat: 44.676, lng: 0.183, fiches: ["Espace-culturel-Duras.pdf", "Recyclerie-pays-de-Duras.pdf"] },
      { commune: "Villeréal", lat: 44.635, lng: 0.742, fiches: ["Bastide-de-Villeréal.pdf"] },
      { commune: "Port-Sainte-Marie", lat: 44.252, lng: 0.389, fiches: ["Vacance-logements-centre-bourg.pdf"] },
      { commune: "Castelmoron-sur-Lot", lat: 44.400, lng: 0.493, fiches: ["Liaison-douce-Castelmoron.pdf"] },
      { commune: "Tombeboeuf", lat: 44.561, lng: 0.530, fiches: ["Maison-santé-Castelmoron-Tombeboeuf.pdf"] },
      { commune: "Montflanquin", lat: 44.530, lng: 0.768, fiches: ["Ecole-maternelle-requalification.pdf"] },
      { commune: "Castillonnès", lat: 44.652, lng: 0.593, fiches: ["Maison-de-la-Bastide.pdf", "Boutique-à-l'essai.pdf"] },
      { commune: "Cancon", lat: 44.536, lng: 0.624, fiches: ["Foirail-jardin-public-Cancon.pdf", "Immeuble-Hicks-logement-saisonniers.pdf"] },
      { commune: "Bastides en Haut-Agenais Périgord", lat: 44.62, lng: 0.68, fiches: ["Tiers-lieu-4Cantons.pdf"] }
    ];

    // Marqueur vert stylisé
    const iconProjet = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:#2e6f5c; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.35); transition:transform 0.25s;"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    // Création des marqueurs + popups
    projets.forEach(p => {
      const marker = L.marker([p.lat, p.lng], { icon: iconProjet }).addTo(map);

      let html = `<strong>${p.commune}</strong><br><br>`;
      p.fiches.forEach(f => {
        html += `<a href="${f}" target="_blank" style="display:block; margin:7px 0; padding:4px 0;">→ ${f}</a>`;
      });

      marker.bindPopup(html, {
        maxWidth: 340,
        className: 'custom-popup'
      });
    });
  </script>
</body>
</html>
