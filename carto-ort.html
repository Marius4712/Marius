<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartographie interactive des projets ORT — Marius Vacqué</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: #111;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0 20px;
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      margin: 0;
    }
    .kicker {
      color: #666;
      font-size: 1.1rem;
      margin-top: 8px;
    }
    #map {
      height: 720px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin-top: 20px;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .leaflet-popup-content {
      margin: 13px 19px;
      font-size: 1rem;
      line-height: 1.5;
    }
    .leaflet-popup-content a {
      color: #4a8c6b;
      font-weight: 600;
      text-decoration: none;
    }
    .leaflet-popup-content a:hover {
      text-decoration: underline;
    }
    .back {
      text-align: center;
      margin: 40px 0;
    }
    .back a {
      padding: 14px 32px;
      background: rgba(74,140,107,0.2);
      color: #111;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
    }
    .back a:hover {
      background: rgba(74,140,107,0.4);
    }
  </style>
</head>
<body>
  <header>
    <h1>Cartographie interactive des projets ORT</h1>
    <div class="kicker">Lot-et-Garonne • Cliquez sur un point pour consulter la fiche projet</div>
  </header>

  <div class="container">
    <div id="map"></div>

    <div class="back">
      <a href="index.html#projets">Retour aux projets</a>
    </div>
  </div>

  <script>
    // Carte centrée sur le Lot-et-Garonne
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true,
      maxZoom: 15,
      minZoom: 8
    }).setView([44.40, 0.40], 9);

    // Fond clair style QGIS-like (OpenStreetMap France + ajustement)
    L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap France | © Contributeurs OpenStreetMap',
      maxZoom: 20
    }).addTo(map);

    // Limites du Lot-et-Garonne (empêche de sortir du département)
    const lotBounds = L.latLngBounds(
      [43.85, -0.60],   // sud-ouest
      [44.80, 1.35]     // nord-est
    );
    map.setMaxBounds(lotBounds);

    // Icône personnalisée (point bleu stylisé QGIS)
    const blueIcon = L.divIcon({
      className: 'custom-marker',
      html: '<div style="background:#4a8c6b; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 6px rgba(0,0,0,0.4);"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    // Données des projets (coordonnées approximatives – tu peux affiner)
    const projets = [
      { lat: 44.398, lng: 0.589, commune: "Sainte-Livrade-sur-Lot", fiches: [
        {nom: "Ilot-Soussial.pdf", lien: "Ilot-Soussial.pdf"},
        {nom: "Berges-du-Lot.pdf", lien: "Berges-du-Lot.pdf"}
      ]},
      { lat: 44.522, lng: 0.355, commune: "Miramont-de-Guyenne", fiches: [
        {nom: "friche-Pimtou.pdf", lien: "friche-Pimtou.pdf"},
        {nom: "Parc-de-la-Dourdene.pdf", lien: "Parc-de-la-Dourdene.pdf"},
        {nom: "Parc-des-équipements.pdf", lien: "Parc-des-équipements.pdf"}
      ]},
      { lat: 44.652, lng: 0.652, commune: "La Sauvetat-du-Dropt", fiches: [
        {nom: "Habitat-La-Sauvetat.pdf", lien: "Habitat-La-Sauvetat.pdf"}
      ]},
      { lat: 44.702, lng: 0.147, commune: "Lauzun", fiches: [
        {nom: "pole-loisir-Lauzun.pdf", lien: "pole-loisir-Lauzun.pdf"}
      ]},
      { lat: 44.136, lng: 0.340, commune: "Nérac", fiches: [
        {nom: "Place-du-Floiral.pdf", lien: "Place-du-Floiral.pdf"},
        {nom: "Réaménagement-Lafayette-Mondenard.pdf", lien: "Réaménagement-Lafayette-Mondenard.pdf"}
      ]},
      { lat: 44.299, lng: 0.340, commune: "Aiguillon", fiches: [
        {nom: "Maison-Santé-Aiguillon.pdf", lien: "Maison-Santé-Aiguillon.pdf"},
        {nom: "Plage-sur-le-Lot.pdf", lien: "Plage-sur-le-Lot.pdf"}
      ]},
      { lat: 44.273, lng: 0.092, commune: "Casteljaloux", fiches: [
        {nom: "Réhabilitation-ancien-hopital-Casteljaloux.pdf", lien: "Réhabilitation-ancien-hopital-Casteljaloux.pdf"}
      ]},
      { lat: 44.678, lng: 0.183, commune: "Duras", fiches: [
        {nom: "Espace-culturel-Duras.pdf", lien: "Espace-culturel-Duras.pdf"},
        {nom: "Recyclerie-pays-de-Duras.pdf", lien: "Recyclerie-pays-de-Duras.pdf"}
      ]},
      { lat: 44.552, lng: 0.740, commune: "Villeréal", fiches: [
        {nom: "Bastide-de-Villeréal.pdf", lien: "Bastide-de-Villeréal.pdf"}
      ]},
      { lat: 44.252, lng: 0.398, commune: "Port-Sainte-Marie", fiches: [
        {nom: "Vacance-logements-centre-bourg.pdf", lien: "Vacance-logements-centre-bourg.pdf"}
      ]},
      { lat: 44.398, lng: 0.552, commune: "Castelmoron-sur-Lot", fiches: [
        {nom: "Liaison-douce-Castelmoron.pdf", lien: "Liaison-douce-Castelmoron.pdf"}
      ]},
      { lat: 44.400, lng: 0.450, commune: "Castelmoron-sur-Lot / Tombebœuf", fiches: [
        {nom: "Maison-santé-Castelmoron-Tombeboeuf.pdf", lien: "Maison-santé-Castelmoron-Tombeboeuf.pdf"}
      ]},
      { lat: 44.533, lng: 0.772, commune: "Montflanquin", fiches: [
        {nom: "Ecole-maternelle-requalification.pdf", lien: "Ecole-maternelle-requalification.pdf"}
      ]},
      { lat: 44.583, lng: 0.652, commune: "Castillonnès", fiches: [
        {nom: "Maison-de-la-Bastide.pdf", lien: "Maison-de-la-Bastide.pdf"},
        {nom: "Boutique-à-l'essai.pdf", lien: "Boutique-à-l'essai.pdf"}
      ]},
      { lat: 44.533, lng: 0.623, commune: "Cancon", fiches: [
        {nom: "Foirail-jardin-public-Cancon.pdf", lien: "Foirail-jardin-public-Cancon.pdf"},
        {nom: "Immeuble-Hicks-logement-saisonniers.pdf", lien: "Immeuble-Hicks-logement-saisonniers.pdf"}
      ]},
      { lat: 44.55, lng: 0.70, commune: "Bastides en Haut-Agenais Périgord", fiches: [
        {nom: "Tiers-lieu-4Cantons.pdf", lien: "Tiers-lieu-4Cantons.pdf"}
      ]}
    ];

    // Ajout des marqueurs
    projets.forEach(p => {
      const marker = L.marker([p.lat, p.lng], {
        icon: L.divIcon({
          className: 'custom-marker',
          html: '<div style="background:#4a8c6b; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 6px rgba(0,0,0,0.4);"></div>',
          iconSize: [16, 16],
          iconAnchor: [8, 8]
        })
      }).addTo(map);

      let popup = `<b>${p.commune}</b><br><br>`;
      p.fiches.forEach(f => {
        popup += `<a href="${f.lien}" target="_blank" style="display:block; margin:6px 0; color:#4a8c6b;">→ ${f.nom}</a>`;
      });

      marker.bindPopup(popup, {
        maxWidth: 320,
        className: 'custom-popup'
      });
    });
  </script>
</body>
</html>
