<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidéos de promotions SEM 47 — Marius Vacqué</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Tu peux copier-coller ici le style de ton index.html pour garder la cohérence (topbar, couleurs, glass, etc.) */
    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: rgba(245,245,245,0.96);
      background: #05080d url("image fond portfolio.jpg") center / cover no-repeat fixed;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0;
      background: rgba(0,0,0,0.6);
    }
    h2 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      margin: 0;
    }
    .kicker {
      color: rgba(245,245,245,0.7);
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 30px;
      padding: 40px 0;
    }
    .card {
      background: rgba(18,22,28,0.58);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 38px rgba(0,0,0,0.36);
    }
    .media img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .body {
      padding: 20px;
    }
    .body h3 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }
    .tags {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      padding: 4px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      font-size: 0.85rem;
    }
    iframe {
      width: 100%;
      height: 315px;
      border: none;
    }
    .back-btn {
      display: inline-block;
      margin: 40px auto;
      padding: 12px 24px;
      background: rgba(138,168,154,0.3);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
    }
    .back-btn:hover {
      background: rgba(138,168,154,0.5);
    }
  </style>
</head>
<body>
  <header>
    <h2>Vidéos de promotions pour la SEM 47</h2>
    <div class="kicker">vidéo • promotion • montage dynamique</div>
  </header>

  <div class="container">
    <div class="grid">
      <!-- Vidéo 1 -->
      <div class="card">
        <div class="media">
          <img src="https://img.youtube.com/vi/ZgKdw8N1DJU/maxresdefault.jpg" alt="Miniature Vidéo 1">
        </div>
        <div class="body">
          <h3>Vidéo 1 – Promotion SEM 47</h3>
          <p>Vidéo courte de promotion des initiatives de la SEM 47.</p>
          <div class="tags">
            <span class="tag">Vidéo</span>
            <span class="tag">SEM 47</span>
          </div>
        </div>
        <iframe src="https://www.youtube.com/embed/ZgKdw8N1DJU" title="Vidéo 1 SEM 47" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>

      <!-- Vidéo 2 -->
      <div class="card">
        <div class="media">
          <img src="https://img.youtube.com/vi/UNz66BP-IZM/maxresdefault.jpg" alt="Miniature Vidéo 2">
        </div>
        <div class="body">
          <h3>Vidéo 2 – Promotion SEM 47</h3>
          <p>Vidéo courte de promotion des initiatives de la SEM 47.</p>
          <div class="tags">
            <span class="tag">Vidéo</span>
            <span class="tag">SEM 47</span>
          </div>
        </div>
        <iframe src="https://www.youtube.com/embed/UNz66BP-IZM" title="Vidéo 2 SEM 47" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
    </div>

    <div style="text-align:center; margin: 60px 0;">
      <a href="index.html#projets" class="back-btn">Retour aux projets</a>
    </div>
  </div>
</body>
</html>
